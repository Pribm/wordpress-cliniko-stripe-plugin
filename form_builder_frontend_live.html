            function buildPatientField(key, patient, onPatientChange = null, fieldRefs = null) {
                const field = document.createElement("div");
                field.className = `es-field es-field--${key}`;

                const inputId = `es-patient-${key}-${Math.random().toString(36).slice(2, 8)}`;

                const label = document.createElement("label");
                label.className = "es-floatLabel";
                label.setAttribute("for", inputId);
                label.textContent = prettifyPatientKey(key);

                const input = document.createElement("input");
                input.id = inputId;
                input.type = inputTypeForPatientKey(key);
                input.className = "es-textInput";
                input.placeholder = " ";

                if (key === "date_of_birth") {
                    input.autocomplete = "bday";
                } else if (
                    key === "phone" ||
                    key === "medicare" ||
                    key === "medicare_reference_number" ||
                    key === "post_code"
                ) {
                    input.inputMode = "numeric";
                }

                if (REQUIRED_PATIENT_FIELDS.has(key)) {
                    input.setAttribute("required", "required");
                }

                if (fieldRefs && typeof fieldRefs === "object") {
                    fieldRefs[key] = input;
                }

                input.value = applyMaskByKey(key, patient[key] || "");

                input.addEventListener("input", () => {
                    if (key === "date_of_birth") {
                        state.answers.patient[key] = normalizeDateYmd(input.value);
                        syncPayloadExposure();
                        if (typeof onPatientChange === "function") onPatientChange();
                        return;
                    }

                    const raw = toRawByKey(key, input.value);
                    const masked = applyMaskByKey(key, raw);
                    if (input.value !== masked) input.value = masked;

                    state.answers.patient[key] = raw;
                    syncPayloadExposure();
                    if (typeof onPatientChange === "function") onPatientChange();
                });

                input.addEventListener("blur", () => {
                    if (key === "date_of_birth") {
                        input.value = normalizeDateYmd(input.value);
                        state.answers.patient[key] = normalizeDateYmd(input.value);
                        syncPayloadExposure();
                        if (typeof onPatientChange === "function") onPatientChange();
                        return;
                    }

                    const raw = toRawByKey(key, input.value);
                    const masked = applyMaskByKey(key, raw);
                    input.value = masked;

                    state.answers.patient[key] = raw;
                    syncPayloadExposure();
                    if (typeof onPatientChange === "function") onPatientChange();
                });

                field.appendChild(input);
                field.appendChild(label);
                return field;
            }

            function renderPatientStep() {
                ensurePatientStepStyles();

                const card = document.createElement("div");
                card.className = "es-stepCard es-stepCard--patient";

                const body = document.createElement("div");
                body.className = "es-stepBody";

                const layout = document.createElement("div");
                layout.className = "es-patientLayout";

                const patient = state.answers.patient || {};
                const hidden = new Set(["appointment_start", "practitioner_id", "appointment_date"]);

                const groups = [
                    {
                        key: "personal",
                        title: "Personal Details",
                        className: "es-patientCard--personal",
                        fields: ["first_name", "last_name", "phone", "date_of_birth", "email"],
                    },
                    {
                        key: "medicare",
                        title: "Medicare",
                        className: "es-patientCard--medicare",
                        fields: ["medicare", "medicare_reference_number"],
                    },
                    {
                        key: "address",
                        title: "Address",
                        className: "es-patientCard--address",
                        fields: ["address_1", "address_2", "city", "state", "post_code", "country"],
                    },
                ];

                const configured = new Set();
                groups.forEach((g) => g.fields.forEach((f) => configured.add(f)));

                const extras = Object.keys(patient).filter(
                    (k) => !hidden.has(k) && !configured.has(k)
                );

                const finalGroups = groups
                    .map((g) => ({
                        ...g,
                        fields: g.fields.filter((f) => Object.prototype.hasOwnProperty.call(patient, f)),
                    }))
                    .filter((g) => g.fields.length > 0);

                if (extras.length > 0) {
                    finalGroups.push({
                        key: "other",
                        title: "Additional Details",
                        className: "es-patientCard--other",
                        fields: extras,
                    });
                }

                if (!finalGroups.length) {
                    const empty = document.createElement("div");
                    empty.className = "es-error";
                    empty.textContent = "No patient fields available in submission template.";
                    body.appendChild(empty);
                    card.appendChild(body);
                    return card;
                }

                let updateMedicarePreview = null;
                const patientFieldRefs = {};
                const handlePatientFieldChange = () => {
                    if (typeof updateMedicarePreview === "function") {
                        updateMedicarePreview();
                    }
                };

                finalGroups.forEach((group) => {
                    const groupCard = document.createElement("section");
                    groupCard.className = `es-patientCard ${group.className}`;

                    const title = document.createElement("h4");
                    title.className = "es-patientCardTitle";
                    title.textContent = group.title;

                    const fieldsWrap = document.createElement("div");
                    fieldsWrap.className = "es-patientFields";

                    group.fields.forEach((key) => {
                        if (hidden.has(key)) return;
                        fieldsWrap.appendChild(
                            buildPatientField(key, patient, handlePatientFieldChange, patientFieldRefs)
                        );
                    });

                    groupCard.appendChild(title);
                    if (group.key === "medicare") {
                        const preview = createMedicarePreview();
                        updateMedicarePreview = preview.update;
                        groupCard.appendChild(preview.wrap);
                    }
                    groupCard.appendChild(fieldsWrap);
                    layout.appendChild(groupCard);
                });

                setupPostcodeLookup(patientFieldRefs.post_code, patientFieldRefs, handlePatientFieldChange);

                body.appendChild(layout);
                card.appendChild(body);
                return card;
            }

            function renderStep(step) {
                if (step.type === "section") return renderSectionStep(step);
                if (step.type === "appointmentSelection") return renderAppointmentSelectionStep();
                if (step.type === "patientDetails") return renderPatientStep();

                const card = document.createElement("div");
                card.className = "es-stepCard";
                card.innerHTML = `<div class="es-stepBody"><div class="es-error">Unknown step.</div></div>`;
                return card;
            }

            function hasSelectedOption(q) {
                const selectedAnswers = (q.answers || []).filter((a) => !!a.selected).length;
                const otherSelected = q?.other?.enabled && q?.other?.selected ? 1 : 0;
                return selectedAnswers + otherSelected;
            }

            function validateCurrentStep() {
                const step = state.steps[state.index];
                if (!step) return true;

                if (step.type === "appointmentSelection") {
                    const p = state.answers.patient || {};
                    if (!String(p.practitioner_id || "").trim()) {
                        alert("Please select a practitioner.");
                        return false;
                    }
                    if (!String(p.appointment_start || "").trim()) {
                        alert("Please select an appointment time.");
                        return false;
                    }
                    if (p.appointment_date && !isValidDateYmd(String(p.appointment_date))) {
                        alert("Appointment date must be YYYY-MM-DD.");
                        return false;
                    }
                    return true;
                }

                if (step.type === "section") {
                    const sec = state.answers.content.sections[step.sectionIndex];
                    for (const q of sec.questions || []) {
                        if (!q.required) continue;

                        if (q.type === "checkboxes" || q.type === "radiobuttons") {
                            const total = hasSelectedOption(q);
                            if (total === 0) {
                                alert(`Please select at least one option for: ${q.name}`);
                                return false;
                            }
                            if (q.type === "radiobuttons" && total > 1) {
                                alert(`Please select only one option for: ${q.name}`);
                                return false;
                            }
                            if (q?.other?.enabled && q.other.selected && !String(q.other.value || "").trim()) {
                                alert(`Please provide "Other" value for: ${q.name}`);
                                return false;
                            }
                        } else {
                            if (!String(q.answer || "").trim()) {
                                alert(`Please answer: ${q.name}`);
                                return false;
                            }
                        }
                    }
                    return true;
                }

                if (step.type === "patientDetails") {
                    const p = normalizePatientForBackend(state.answers.patient || {});

                    for (const field of REQUIRED_PATIENT_FIELDS) {
                        if (!String(p[field] || "").trim()) {
                            alert(`${prettifyPatientKey(field)} is required.`);
                            return false;
                        }
                    }

                    if (!EMAIL_RE.test(String(p.email || ""))) {
                        alert("Please enter a valid email.");
                        return false;
                    }

                    if (!/^\d{9}$/.test(String(p.medicare || ""))) {
                        alert("Medicare must contain exactly 9 digits.");
                        return false;
                    }

                    if (!/^[1-9]$/.test(String(p.medicare_reference_number || ""))) {
                        alert("Medicare reference number must be one digit from 1 to 9.");
                        return false;
                    }

                    if (p.date_of_birth && !isValidDateYmd(String(p.date_of_birth))) {
                        alert("Date of birth must be a valid date.");
                        return false;
                    }

                    if (p.appointment_start && !ISO_RE.test(String(p.appointment_start))) {
                        alert("Appointment start must be ISO8601.");
                        return false;
                    }

                    if (!String(p.practitioner_id || "").trim()) {
                        alert("Practitioner is required.");
                        return false;
                    }

                    if (!String(p.appointment_start || "").trim()) {
                        alert("Appointment time is required.");
                        return false;
                    }

                    if (!String(state.answers.moduleId || "").trim()) {
                        alert("Module ID is missing.");
                        return false;
                    }

                    if (!String(state.answers.patient_form_template_id || "").trim()) {
                        alert("Patient form template ID is missing.");
                        return false;
                    }
                }

                return true;
            }

            function isPatientDetailsStep(step) {
                return step?.type === "patientDetails";
            }

            async function renderWithTransition(opts) {
                const animate = !!opts?.animate;

                if (state.isRendering) return;
                state.isRendering = true;

                if (state.paymentActive) {
                    ui.shellWrap.style.display = "none";
                    state.isRendering = false;
                    return;
                }

                if (!state.steps.length) {
                    ui.root.innerHTML = `<div class="es-stepCard"><div class="es-error">No steps found.</div></div>`;
                    state.isRendering = false;
                    return;
                }

                state.index = Math.max(0, Math.min(state.index, state.steps.length - 1));
                const step = state.steps[state.index];

                setShellHeaderTitle(step?.title || "");

                const existing = ui.root.querySelector(".es-stepCard");
                const doAnim = animate && !prefersReducedMotion;

                if (doAnim && existing) {
                    existing.classList.add("es-step-exit");
                    await sleep(160);
                }

                ui.root.innerHTML = "";
                const card = renderStep(step);

                if (doAnim) card.classList.add("es-step-enter");
                ui.root.appendChild(card);

                if (doAnim) {
                    requestAnimationFrame(() => card.classList.add("es-step-enter-active"));
                    setTimeout(() => {
                        card.classList.remove("es-step-enter");
                        card.classList.remove("es-step-enter-active");
                    }, 240);
                }

                setProgress(state.index, state.steps.length);

                ui.back.disabled = state.index === 0;

                const isLast = state.index === state.steps.length - 1;
                ui.next.classList.toggle("es-hidden", isLast);
                ui.submit.classList.toggle("es-hidden", !isLast);
                ui.submit.textContent = isLast && isPatientDetailsStep(step) ? "Continue to payment" : "Submit";

                state.isRendering = false;
                requestAnimationFrame(triggerConditionals);
            }

            function render(animate) {
                return renderWithTransition({ animate: !!animate });
            }

            async function goNext() {
                if (!validateCurrentStep()) return;
                scrollStepRootToTop();
                state.index = Math.min(state.index + 1, state.steps.length - 1);
                await render(true);
                scrollStepRootToTop();
                setTimeout(() => scrollStepRootToTop(), 120);
            }

            async function goBack() {
                scrollStepRootToTop();
                state.index = Math.max(state.index - 1, 0);
                await render(true);
                scrollStepRootToTop();
                setTimeout(() => scrollStepRootToTop(), 120);
            }

            function onSubmitClick() {
                const step = state.steps[state.index];

                if (isPatientDetailsStep(step) && state.index === state.steps.length - 1) {
                    if (!validateCurrentStep()) return;
                    syncPayloadExposure();
                    // Always use window top scroll before entering payment (desktop and mobile).
                    scrollStepRootToTop(true);
                    showPayment();
                    setTimeout(() => scrollStepRootToTop(true), 120);
                    return;
                }

                console.log("Headless payload:", window.clinikoGetHeadlessPayload());
            }

            ui.back.addEventListener("click", goBack);
            ui.next.addEventListener("click", goNext);
            ui.submit.addEventListener("click", onSubmitClick);

            render(false);
        }
    })();
</script>
