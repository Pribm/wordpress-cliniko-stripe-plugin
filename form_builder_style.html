<style>
    /* =========================================================
   EASY SCRIPTS STEP UI — CLEAN
   Scoped under .es-shellWrap
   ========================================================= */

    /* ---------- Tokens / base scope ---------- */
    .es-shellWrap {
        --es-ink: #1f2c3b;
        --es-muted: rgba(31, 44, 59, .72);

        --es-primary: #5EB192;
        --es-primary-dark: #2C5848;
        --es-accent: #D7ECE4;
        --btn-bg: var(--es-primary);
        --btn-bg-rgb: 94, 177, 146;
        --btn-text: #ffffff;
        --titles-color: var(--es-primary-dark);
        --slot-accent: var(--e-global-color-primary, var(--btn-bg));
        --slot-accent-soft: rgba(var(--btn-bg-rgb), 0.08);
        --calendar-nav-bg: var(--e-global-color-primary, var(--btn-bg));
        --calendar-nav-text: var(--e-global-color-primary-contrast, var(--btn-text));
        --calendar-nav-shadow: rgba(var(--btn-bg-rgb), 0.2);
        --calendar-accent: var(--e-global-color-primary, var(--btn-bg));
        --calendar-accent-soft: rgba(var(--btn-bg-rgb), 0.16);

        --es-bg: #f6fbf9;
        --es-card: #ffffff;

        --es-border: rgba(31, 44, 59, .12);
        --shadow: 0 16px 42px rgba(31, 44, 59, .12);
        --shadow-soft: 0 10px 22px rgba(31, 44, 59, .10);

        --r-xl: 22px;
        --r-lg: 18px;
        --r-md: 14px;

        --focus: 0 0 0 4px rgba(94, 177, 146, .22);

        /* navbar heights */
        --es-nav-desktop: 88px;
        --es-nav-mobile: 70px;

        font-family: "Poppins", "Helvetica Neue", Arial, sans-serif;
        color: var(--es-ink);

        display: flex;
        align-items: center;
        justify-content: center;

        margin-top: 100px !important;
        min-height: calc(100vh - 220px);
    }

    .es-shellWrap,
    .es-shellWrap * {
        box-sizing: border-box;
    }

    /* ---------- Layout shell ---------- */
    .es-shellWrap .es-page {
        min-height: 1px;
        display: grid;
        place-items: center;
        padding: 16px;
        width: 100%;
        height: 100%;
    }

    .es-shellWrap .es-shell {
        width: min(760px, 100%);
        background: rgba(255, 255, 255, .75);
        border: 1px solid var(--es-border);
        border-radius: var(--r-xl);
        box-shadow: var(--shadow);
        overflow: hidden;
        backdrop-filter: blur(8px);
        display: flex;
        flex-direction: column;
        margin-bottom: auto;
        height: 100%;
    }

    .es-shellWrap .es-header {
        padding: 18px;
        border-bottom: 1px solid var(--es-border);
        background: linear-gradient(180deg, rgba(255, 255, 255, .92), rgba(255, 255, 255, .70));
    }

    /* ---------- Header intro ---------- */
    .es-shellWrap .es-headIntro {
        display: grid;
        gap: 2px;
        margin-bottom: 10px;
    }

    .es-shellWrap .es-headIntro__title {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0;
        color: var(--es-primary);
    }

    .es-shellWrap .es-headIntro__sub {
        font-size: 13px;
        color: var(--es-muted);
        line-height: 1.35;
    }

    /* ---------- Progress ---------- */
    .es-shellWrap .es-progress__meta {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 13px;
        color: var(--es-muted);
    }

    .es-shellWrap .es-progress__track {
        height: 8px;
        background: rgba(31, 44, 59, .06);
        border: 1px solid var(--es-border);
        border-radius: 999px;
        overflow: hidden;
    }

    .es-shellWrap .es-progress__fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--es-primary), rgba(94, 177, 146, .55));
        border-radius: 999px;
        transition: width 220ms ease;
    }

    /* ---------- Step mount ---------- */
    .es-shellWrap .es-stepRoot {
        padding: 18px;
        background: #F5F5F5;
        overflow-y: auto;
        min-width: 100%;
        flex: 1 1 auto;
    }

    .es-shellWrap #esStepRoot {
        width: 100%;
    }

    /* ---------- Step card ---------- */
    .es-shellWrap .es-stepCard {
        background: var(--es-card);
        border: 1px solid var(--es-border);
        padding: 16px;
    }

    /* ---------- Payment overlay ---------- */
    .es-shellWrap.es-hasPaymentOverlay .es-stepRoot {
        overflow: visible;
    }

    .es-shellWrap.es-paymentDetached .es-stepCard--payment .es-stepBody {
        display: none;
    }

    .es-shellWrap.es-paymentDetached .es-header,
    .es-shellWrap.es-paymentDetached .es-footer {
        opacity: 0;
        pointer-events: none;
    }

    .es-payment-portal {
        position: fixed;
        left: 0;
        right: 0;
        top: var(--es-siteHeader, 0px);
        width: 100%;
        height: var(--es-viewportMinusHeader, 100dvh);
        z-index: 9999;
        display: none;
        background: #fff;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        overflow: hidden;
        flex-direction: column;
    }

    .es-payment-portal.is-active {
        display: flex;
    }

    .es-paymentFrame {
        flex: 0 0 auto;
        width: 100%;
        overflow: hidden;
        min-height: calc(100% - 70px);
    }

    .es-payment-portal iframe {
        border: 0;
    }

    .es-paymentBar {
        display: block;
        width: 100%;
        height: 70px;
        justify-content: center;
        padding: 12px 16px;
        border-top: 1px solid var(--es-border);
        background: #fff;
        position: absolute;
        bottom: 70px;
        left: 0;
        right: 0;
        z-index: 2;
    }

    .es-paymentBack {
        border: 1px solid var(--es-primary-dark);
        background: #5EB192;
        color: #fff;
        padding: 14px 18px;
        border-radius: 8px;
        display: inline-flex;
        gap: 10px;
        align-items: center;
        font-weight: 600;
        cursor: pointer;
        box-shadow: var(--shadow-soft);
        pointer-events: auto;
    }

    .es-paymentBack:focus {
        outline: none;
        box-shadow: var(--focus);
        border-color: rgba(94, 177, 146, .55);
    }

    .es-paymentBack:hover {
        background: #2C5848;
    }

    .es-shellWrap .es-stepTitle {
        margin: 0;
        font-size: 14px;
    }

    .es-shellWrap .es-stepHelp {
        margin: 0 0 14px;
        font-size: 14px;
        color: var(--es-muted);
    }

    /* ---------- Errors ---------- */
    .es-shellWrap .es-error {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(225, 60, 60, .25);
        background: rgba(225, 60, 60, .06);
        color: rgba(160, 35, 35, .95);
        font-size: 13px;
    }

    /* ---------- Options / cards ---------- */
    .es-shellWrap .es-options {
        display: grid;
        gap: 10px;
        margin-top: 14px;
    }

    .es-shellWrap .es-cardOpt {
        --es-cardopt-active-bg: var(--es-primary);
        --es-cardopt-active-border: var(--es-primary);
        --es-cardopt-active-ink: #fff;
        --es-cardopt-active-shadow: 0 0 0 2px rgba(var(--btn-bg-rgb), .18), 0 8px 18px rgba(var(--btn-bg-rgb), .22);
        width: 100%;
        max-width: 100%;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;

        border-radius: var(--r-lg);
        border: 1px solid color-mix(in srgb, var(--es-primary) 34%, white 66%);
        background: #ffffff;

        cursor: pointer;
        user-select: none;
        transition: border-color 180ms ease, box-shadow 180ms ease, background-color 180ms ease, color 180ms ease;
        color: color-mix(in srgb, var(--es-primary) 72%, black 28%);
    }

    .es-shellWrap .es-cardOpt:focus-visible {
        outline: 3px solid rgba(var(--btn-bg-rgb), .34);
        outline-offset: 2px;
    }

    /* Keep hover + selected visually identical */
    .es-shellWrap .es-cardOpt:hover,
    .es-shellWrap .es-cardOpt[aria-pressed="true"],
    .es-shellWrap .es-cardOpt[aria-checked="true"] {
        border-color: var(--es-cardopt-active-border) !important;
        background: var(--es-cardopt-active-bg) !important;
        color: var(--es-cardopt-active-ink) !important;
        box-shadow: var(--es-cardopt-active-shadow) !important;
    }

    .es-shellWrap .es-optIc {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        background: color-mix(in srgb, var(--es-primary) 20%, white 80%);
        border: 0;
        color: var(--es-primary);
        flex: 0 0 auto;
    }

    .es-shellWrap .es-optIc i {
        font-size: 20px;
        color: var(--es-primary);
        opacity: 1;
        transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease, color 160ms ease;
    }

    .es-shellWrap .es-cardOpt .es-optText,
    .es-shellWrap .es-cardOpt .es-optIc,
    .es-shellWrap .es-cardOpt .es-optLabel {
        transition: color 180ms ease;
    }

    .es-shellWrap .es-cardOpt:hover .es-optText,
    .es-shellWrap .es-cardOpt:hover .es-optIc,
    .es-shellWrap .es-cardOpt:hover .es-optLabel,
    .es-shellWrap .es-cardOpt[aria-checked="true"] .es-optText,
    .es-shellWrap .es-cardOpt[aria-pressed="true"] .es-optText,
    .es-shellWrap .es-cardOpt[aria-checked="true"] .es-optIc,
    .es-shellWrap .es-cardOpt[aria-pressed="true"] .es-optIc,
    .es-shellWrap .es-cardOpt[aria-checked="true"] .es-optLabel,
    .es-shellWrap .es-cardOpt[aria-pressed="true"] .es-optLabel,
    .es-shellWrap .es-cardOpt:hover .es-optIc i {
        color: var(--es-cardopt-active-ink) !important;
        opacity: 1;
    }

    .es-shellWrap .es-cardOpt:hover .es-optIc,
    .es-shellWrap .es-cardOpt[aria-checked="true"] .es-optIc,
    .es-shellWrap .es-cardOpt[aria-pressed="true"] .es-optIc {
        background: rgba(255, 255, 255, .16);
        color: var(--es-cardopt-active-ink) !important;
    }

    .es-shellWrap .es-optText {
        display: grid;
        gap: 2px;
        min-width: 0;
        flex: 1 1 auto;
        color: var(--es-primary);
    }

    .es-shellWrap .es-optLabel {
        font-weight: 750;
        font-size: 15px;
        min-width: 0;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
        text-align: left;
    }

    .es-shellWrap .es-cardOpt[aria-checked="true"] .es-optIc,
    .es-shellWrap .es-cardOpt[aria-pressed="true"] .es-optIc {
        color: var(--es-cardopt-active-ink) !important;
    }

    .es-shellWrap .es-cardOpt:hover .es-optIc i,
    .es-shellWrap .es-cardOpt[aria-checked="true"] .es-optIc i,
    .es-shellWrap .es-cardOpt[aria-pressed="true"] .es-optIc i {
        color: #fff !important;
        opacity: 1;
        transform: scale(1.06);
        filter: none;
    }

    /* ---------- Text / inputs in wizard ---------- */
    .es-shellWrap .es-field {
        display: grid;
        margin-top: 14px;
    }

    .es-shellWrap .es-label {
        font-size: 13px;
        color: rgba(31, 44, 59, .82);
        font-weight: 600;
    }

    /* cleanup: unify duplicate text input rules */
    .es-shellWrap .es-textInput,
    .es-shellWrap .inputGroup input[type="text"] {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #5eb192;
        background: #fff;
        color: #0c0d0e;
        padding: 10px 12px;
        outline: none;
        font-size: 14px;
        transition: box-shadow 140ms ease, border-color 140ms ease;
    }

    .es-shellWrap .es-textInput:focus,
    .es-shellWrap .inputGroup input[type="text"]:focus {
        box-shadow: var(--focus);
        border-color: rgba(94, 177, 146, .55);
    }

    .es-shellWrap .es-textarea {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--es-border);
        background: #fff;
        color: var(--es-ink);
        padding: 10px 12px;
        outline: none;
        font-size: 14px;
        min-height: 120px;
        resize: vertical;
    }

    .es-shellWrap .es-textarea:focus {
        box-shadow: var(--focus);
        border-color: rgba(94, 177, 146, .55);
    }

    /* ---------- Wizard footer buttons ---------- */
    .es-shellWrap .es-footer {
        padding: 14px 18px 18px;
        border-top: 1px solid var(--es-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, .70);
    }

    .es-shellWrap .es-footer__right {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .es-shellWrap .es-btn {
        border: 1px solid var(--es-border);
        background: #fff;
        color: var(--es-ink);
        padding: 10px 14px;
        border-radius: 8px;
        cursor: pointer;
        display: inline-flex;
        gap: 10px;
        align-items: center;
        font-weight: 600;
    }

    .es-shellWrap .es-btn:focus {
        outline: none;
        box-shadow: var(--focus);
        border-color: rgba(94, 177, 146, .55);
    }

    .es-shellWrap .es-btn:disabled {
        opacity: .55;
        cursor: not-allowed;
    }

    .es-shellWrap .es-btn--ghost {
        background: transparent;
    }

    .es-shellWrap .es-btn--primary {
        border-color: rgba(94, 177, 146, .45);
        background: linear-gradient(135deg, rgba(94, 177, 146, .18), rgba(215, 236, 228, .35));
    }

    .es-shellWrap .es-btn--success {
        border-color: rgba(94, 177, 146, .55);
        background: linear-gradient(135deg, rgba(94, 177, 146, .18), rgba(94, 177, 146, .08));
    }

    /* cleanup: remove duplicate .es-btn--ghost */
    .es-shellWrap .es-btn--primary:hover,
    .es-shellWrap .es-btn--success:hover {
        background: linear-gradient(135deg, rgba(94, 177, 146, .24), rgba(215, 236, 228, .42));
    }

    .es-shellWrap .es-btn--ghost:hover {
        background: rgba(31, 44, 59, .04);
    }

    .es-shellWrap .es-hidden {
        display: none !important;
    }

    /* ---------- Custom mapping step ---------- */
    .es-customStep {
        display: grid;
        gap: 12px;
    }

    .es-customStep__head {
        display: grid;
        gap: 4px;
    }

    .es-customStep__title {
        font-size: 16px;
        font-weight: 800;
        color: var(--es-ink);
    }

    .es-customStep__sub {
        font-size: 13px;
        color: var(--es-muted);
        line-height: 1.35;
    }

    .es-customGrid {
        display: grid;
    }

    @media (min-width:720px) {
        .es-customGrid {
            grid-template-columns: 1fr 1fr;
        }
    }

    /* ---------- Real form hidden mount ---------- */
    #prepayment-form,
    #prepayment-form.es-formMount {
        position: absolute !important;
        left: -100000px !important;
        top: 0 !important;
        width: 1px !important;
        height: 1px !important;
        overflow: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        margin: 0 !important;
        padding: 0 !important;
        border: 0 !important;
    }

    /* ---------- Patient details hint ---------- */
    .es-shellWrap .es-patientHint {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin: 10px 0 14px;
        padding: 12px;
        border-radius: 18px;
        border: 1px solid var(--es-border);
        background: linear-gradient(180deg, color-mix(in srgb, var(--es-accent) 70%, white 30%), white);
    }

    .es-shellWrap .es-patientHint__text {
        min-width: 0;
    }

    .es-shellWrap .es-patientHint__title {
        font-weight: 800;
        font-size: 14px;
        margin: 0 0 4px;
    }

    .es-shellWrap .es-patientHint__sub {
        margin: 0;
        color: var(--es-muted);
        font-size: 13px;
        line-height: 1.4;
    }

    .es-shellWrap .es-patientHint__img {
        flex: 0 0 auto;
        width: 170px;
        max-width: 42%;
        border-radius: 14px;
        border: 1px solid rgba(31, 44, 59, .10);
        box-shadow: 0 10px 22px rgba(31, 44, 59, .08);
        background: #fff;
    }

    .es-shellWrap .es-nativeForm {
        margin-top: 10px;
    }

    .es-shellWrap .es-nativeForm .patient-grid,
    .es-shellWrap .es-nativeForm .ui-section-group,
    .es-shellWrap .es-nativeForm .form-step {
        width: 100% !important;
        max-width: 100% !important;
    }

    .es-shellWrap .es-nativeForm .inputGroup {
        background: transparent !important;
        border: 0 !important;
        padding: 0 !important;
        margin: 0 0 14px !important;
    }

    .es-shellWrap .es-nativeForm .question-title,
    .es-shellWrap .es-nativeForm label,
    .es-shellWrap .es-nativeForm .field-label {
        color: rgba(31, 44, 59, .86);
        font-size: 13px;
        margin: 0 !important;
    }



    .es-shellWrap .es-nativeForm input[type="text"],
    .es-shellWrap .es-nativeForm input[type="email"],
    .es-shellWrap .es-nativeForm input[type="tel"],
    .es-shellWrap .es-nativeForm input[type="number"],
    .es-shellWrap .es-nativeForm input[type="date"],
    .es-shellWrap .es-nativeForm input[type="search"],
    .es-shellWrap .es-nativeForm select,
    .es-shellWrap .es-nativeForm textarea {
        width: 100% !important;
        border-radius: 8px !important;
        border: 1px solid var(--es-border) !important;
        background: #fff !important;
        color: var(--es-ink) !important;
        padding: 10px 12px !important;
        outline: none !important;
        font-size: 14px !important;
        box-shadow: none !important;
        transition: box-shadow 140ms ease, border-color 140ms ease;
    }

    .es-shellWrap .es-nativeForm textarea {
        min-height: 110px !important;
        resize: vertical !important;
    }

    .es-shellWrap .es-nativeForm input:focus,
    .es-shellWrap .es-nativeForm select:focus,
    .es-shellWrap .es-nativeForm textarea:focus {
        box-shadow: var(--focus) !important;
        border-color: rgba(94, 177, 146, .55) !important;
    }

    .es-shellWrap .es-nativeForm .req {
        color: rgba(160, 35, 35, .95);
        font-weight: 800;
    }

    .es-shellWrap .es-nativeForm input[type="checkbox"],
    .es-shellWrap .es-nativeForm input[type="radio"] {
        accent-color: var(--es-primary);
    }

    /* ---------- Medication chips autocomplete (wizard) ---------- */
    .es-shellWrap .es-medBox {
        border-radius: 18px;
        position: relative;
    }

    .es-shellWrap .es-medRow {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
    }

    .es-shellWrap .es-chip {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(31, 44, 59, .12);
        background: linear-gradient(180deg, rgba(215, 236, 228, .65), #fff);
        color: var(--es-primary-dark);
        font-weight: 750;
        font-size: 13px;
        max-width: 100%;
    }

    .es-shellWrap .es-chip__text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 48vw;
    }

    .es-shellWrap .es-chip__x {
        width: 22px;
        height: 22px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        border: 1px solid rgba(31, 44, 59, .14);
        background: rgba(31, 44, 59, .04);
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
        user-select: none;
    }

    .es-shellWrap .es-medInput {
        width: 100%;
        border: 1px solid rgba(31, 44, 59, .12);
        border-radius: 16px;
        padding: 12px 14px;
        outline: none;
        font-size: 15px;
        margin-top: 10px;
    }

    .es-shellWrap .es-medInput:focus {
        box-shadow: var(--focus);
        border-color: rgba(94, 177, 146, .55);
    }

    .es-shellWrap .es-suggest {
        position: absolute;
        left: 10px;
        right: 10px;
        top: calc(100% + 8px);
        z-index: 9999;
        border-radius: 16px;
        border: 1px solid rgba(31, 44, 59, .12);
        background: #fff;
        box-shadow: 0 16px 42px rgba(31, 44, 59, .12);
        overflow: hidden;
        display: none;
    }

    .es-shellWrap .es-suggest.is-open {
        display: block;
    }

    .es-shellWrap .es-suggest__item {
        padding: 12px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        border-bottom: 1px solid rgba(31, 44, 59, .08);
    }

    .es-shellWrap .es-suggest__item:last-child {
        border-bottom: 0;
    }

    .es-shellWrap .es-suggest__item:hover,
    .es-shellWrap .es-suggest__item[aria-selected="true"] {
        background: rgba(215, 236, 228, .45);
    }

    .es-shellWrap .es-suggest__name {
        font-weight: 750;
        color: var(--es-ink);
        font-size: 14px;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .es-shellWrap .es-suggest__tag {
        font-size: 12px;
        color: rgba(31, 44, 59, .62);
        border: 1px solid rgba(31, 44, 59, .12);
        background: rgba(31, 44, 59, .03);
        padding: 4px 8px;
        border-radius: 999px;
        flex: 0 0 auto;
    }

    /* ---------- Portal dropdown (lives in <body>) ---------- */
    .es-suggest--portal {
        position: fixed !important;
        z-index: 999999 !important;
        display: none;
        overflow: auto;
        border-radius: 16px;
        border: 1px solid rgba(31, 44, 59, .12);
        background: #fff;
        box-shadow: 0 16px 42px rgba(31, 44, 59, .12);
    }

    .es-suggest--portal.is-open {
        display: block;
    }

    .es-suggest--portal .es-suggest__item {
        padding: 12px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        border-bottom: 1px solid rgba(31, 44, 59, .08);
    }

    .es-suggest--portal .es-suggest__item:last-child {
        border-bottom: 0;
    }

    .es-suggest--portal .es-suggest__item:hover,
